bot:
  name: "My Assistant"
  avatar: "/avatar.png"
  tone: "friendly"
  greeting:
    en: "Hi! How can I help you today?"
    ko: "안녕하세요! 무엇을 도와드릴까요?"

service:
  name: "Our Service"
  fallback_message:
    en: "I don't have information about that. Let me connect you with our team."
    ko: "해당 내용에 대한 정보가 없습니다. 담당자에게 연결해 드리겠습니다."

cta:
  primary:
    text:
      en: "Get started →"
      ko: "시작하기 →"
    url: "/get-started"

presets:
  - en: "What is your service?"
    ko: "서비스가 뭔가요?"
  - en: "How much does it cost?"
    ko: "가격이 얼마인가요?"
  - en: "How do I get started?"
    ko: "어떻게 시작하나요?"

email_form:
  enabled: true
  fields:
    - name: "email"
      type: "email"
      required: true
      label:
        en: "Email"
        ko: "이메일"
      placeholder:
        en: "your@email.com"
        ko: "your@email.com"
    - name: "message"
      type: "text"
      required: false
      label:
        en: "Message (optional)"
        ko: "메시지 (선택)"
      placeholder:
        en: "Any additional details..."
        ko: "추가 내용을 입력하세요..."
  submit_text:
    en: "Submit"
    ko: "제출하기"
  success_message:
    en: "Thank you! We'll get back to you soon."
    ko: "감사합니다! 곧 연락드리겠습니다."

limits:
  max_messages_per_session: 10
  soft_cta_after: 3
  hard_redirect_after: 7
  max_input_length: 500

cost_safety:
  monthly_budget_usd: 30
  daily_budget_usd: 1.00
  kill_switch_usd: 27
  max_sessions_per_day: 50
  rate_limit_per_minute: 5

security:
  blocked_keywords:
    - "ignore previous"
    - "ignore above"
    - "system prompt"
    - "you are now"
    - "act as"
    - "pretend to be"
    - "reveal your instructions"
    - "이전 지시를 무시"
    - "시스템 프롬프트"

brand_color: "#6366f1"
